name: Publish release to WinGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v, e.g. 3.5.4'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: RcloneUI.RcloneUI
          version: ${{ inputs.version }}
          release-tag: v${{ inputs.version }}
          installers-regex: '^Rclone\.UI_(x64|arm64)\.exe$'
          token: ${{ secrets.WINGET_ACC_TOKEN }}