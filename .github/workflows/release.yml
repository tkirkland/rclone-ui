name: 'release'

on:
  push:
    branches:
      - personal_changes
      - test/node-24
  workflow_dispatch:

jobs:
  release-linux:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Append personal version suffix
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PERSONAL="${VERSION}-personal"
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" src-tauri/tauri.conf.json
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" package.json
          sed -i "s/^version = \"${VERSION}\"/version = \"${PERSONAL}\"/" src-tauri/Cargo.toml
          echo "Patched version: ${VERSION} -> ${PERSONAL}"

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: |
            # Rclone UI v__VERSION__ (Personal Build)
            Linux x64 and Windows x64. Unsigned. See assets below.
          releaseDraft: true
          prerelease: false
          args: "--config '{\"bundle\":{\"createUpdaterArtifacts\":false}}'"

  release-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append personal version suffix
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PERSONAL="${VERSION}-personal"
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" src-tauri/tauri.conf.json
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" package.json
          sed -i "s/^version = \"${VERSION}\"/version = \"${PERSONAL}\"/" src-tauri/Cargo.toml
          echo "Patched version: ${VERSION} -> ${PERSONAL}"

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: |
            # Rclone UI v__VERSION__ (Personal Build)
            Linux x64 and Windows x64. Unsigned. See assets below.
          releaseDraft: true
          prerelease: false
          args: "--config '{\"bundle\":{\"createUpdaterArtifacts\":false}}'"
