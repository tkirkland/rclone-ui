name: 'sync-fork-from-upstream'

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync main from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/rclone-ui/rclone-ui.git
          git fetch upstream
          git checkout main
          cp .github/workflows/sync-fork-from-upstream.yml /tmp/sync-fork-from-upstream.yml
          git reset --hard upstream/main
          mkdir -p .github/workflows
          cp /tmp/sync-fork-from-upstream.yml .github/workflows/sync-fork-from-upstream.yml
          git add .github/workflows/sync-fork-from-upstream.yml
          git diff --staged --quiet || git commit -m "chore: preserve sync workflow"
          git push origin main --force-with-lease
