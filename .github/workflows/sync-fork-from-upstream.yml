name: 'sync-fork-from-upstream'

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout personal_changes
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: personal_changes

      - name: Mirror main from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/rclone-ui/rclone-ui.git
          git fetch upstream
          git fetch origin main

          BEFORE=$(git rev-parse origin/main)
          git checkout -B upstream-mirror upstream/main
          rm -f .github/workflows/release-winget.yml

          if ! git diff --quiet upstream/main -- .github/workflows/release-winget.yml; then
            git add .github/workflows/release-winget.yml
            git commit -m "ci: remove upstream winget workflow from fork mirror"
          fi

          if [ "$(git rev-parse origin/main^{tree})" = "$(git rev-parse HEAD^{tree})" ]; then
            echo "main already matches sanitized upstream/main, nothing to mirror"
            echo "UPSTREAM_CHANGED=false" >> $GITHUB_ENV
          else
            git log --reverse --oneline origin/main..upstream/main > "$GITHUB_WORKSPACE/upstream-commits.txt"
            git push origin "HEAD:refs/heads/main" --force-with-lease="refs/heads/main:$BEFORE"
            echo "UPSTREAM_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Open upstream review issue
        if: env.UPSTREAM_CHANGED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="upstream changes need personal review"
          COMMITS="$(cat "$GITHUB_WORKSPACE/upstream-commits.txt")"
          BODY="$(cat <<EOF
          Upstream changed and \`main\` was refreshed to the sanitized upstream mirror.

          Review these upstream commits and decide what should be cherry-picked into \`personal_changes\`:

          \`\`\`
          $COMMITS
          \`\`\`

          This issue is a notification only. Do not merge \`main\` into \`personal_changes\` blindly; \`personal_changes\` intentionally skips upstream repo/packaging changes that do not apply to this fork.
          EOF
          )"

          EXISTING=$(gh issue list --state open --json number,title --jq ".[] | select(.title == \"$TITLE\") | .number" | head -n 1)

          if [ -n "$EXISTING" ]; then
            echo "Existing upstream review issue #$EXISTING is open — adding a fresh comment."
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "$TITLE" \
              --assignee "${{ github.repository_owner }}" \
              --body "$BODY"
          fi
