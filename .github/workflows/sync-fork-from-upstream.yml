name: 'sync-fork-from-upstream'

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync main from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/rclone-ui/rclone-ui.git
          git fetch upstream

          BEFORE=$(git rev-parse HEAD)

          # Preserve personal workflow files before wiping main
          mkdir -p /tmp/workflows
          cp .github/workflows/sync-fork-from-upstream.yml /tmp/workflows/
          cp .github/workflows/release.yml /tmp/workflows/

          git checkout main
          git reset --hard upstream/main

          # Remove upstream workflow files and restore only personal ones
          rm -rf .github/workflows/*
          mkdir -p .github/workflows
          cp /tmp/workflows/sync-fork-from-upstream.yml .github/workflows/sync-fork-from-upstream.yml
          cp /tmp/workflows/release.yml .github/workflows/release.yml

          git add .github/workflows/
          git diff --staged --quiet || git commit -m "chore: preserve personal workflows after upstream sync"

          AFTER=$(git rev-parse HEAD)
          git push origin main --force-with-lease

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "UPSTREAM_CHANGED=false" >> $GITHUB_ENV
          else
            echo "UPSTREAM_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Merge main into personal_changes
        if: env.UPSTREAM_CHANGED == 'true'
        run: |
          git fetch origin personal_changes
          git checkout personal_changes

          if git merge main --no-edit; then
            git push origin personal_changes
            echo "MERGE_STATUS=success" >> $GITHUB_ENV
          else
            git merge --abort
            echo "MERGE_STATUS=conflict" >> $GITHUB_ENV
          fi

      - name: Fail loudly on merge conflict
        if: env.UPSTREAM_CHANGED == 'true' && env.MERGE_STATUS == 'conflict'
        run: |
          echo "::error::Merge conflict detected merging upstream main into personal_changes. Manual intervention required."
          exit 1
