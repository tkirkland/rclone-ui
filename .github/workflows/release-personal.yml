name: 'release-personal'

on:
  push:
    branches:
      - personal_changes
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-linux:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Append personal version suffix
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PERSONAL="${VERSION}-personal"
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" src-tauri/tauri.conf.json
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" package.json
          sed -i "s/^version = \"${VERSION}\"/version = \"${PERSONAL}\"/" src-tauri/Cargo.toml
          echo "PERSONAL_VERSION=${PERSONAL}" >> "$GITHUB_ENV"
          echo "Patched version: ${VERSION} -> ${PERSONAL}"

      - name: Generate changelog
        id: changelog
        run: |
          # Find the latest release tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "Generating changelog since $LAST_TAG"
            RANGE="${LAST_TAG}..HEAD"
          else
            echo "No previous tag found — using full history"
            RANGE="HEAD"
          fi

          # Build categorized changelog
          {
            echo "BODY<<CHANGELOG_EOF"
            echo "# Rclone UI v${PERSONAL_VERSION}"
            echo ""
            echo "Linux x64 and Windows x64. Unsigned personal build."
            echo ""

            # Upstream changes (merge commits from sync)
            UPSTREAM=$(git log "$RANGE" --oneline --grep="upstream" --grep="sync" --all-match 2>/dev/null || true)
            if [ -n "$UPSTREAM" ]; then
              echo "## 🔄 Upstream"
              echo "$UPSTREAM" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            # Features
            FEATURES=$(git log "$RANGE" --oneline --grep="^feat" --no-merges 2>/dev/null || true)
            if [ -n "$FEATURES" ]; then
              echo "## ✨ Features"
              echo "$FEATURES" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --oneline --grep="^fix" --no-merges 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "## 🐛 Fixes"
              echo "$FIXES" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            # Other changes (chore, refactor, test, docs, etc.)
            OTHER=$(git log "$RANGE" --oneline --no-merges --invert-grep --grep="^feat" --grep="^fix" 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "## 🔧 Other"
              echo "$OTHER" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.BODY }}
          releaseDraft: false
          prerelease: false
          args: "--config '{\"bundle\":{\"createUpdaterArtifacts\":false}}'"

      - name: Rename Linux release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rename_asset() {
            local extension="$1"
            local target_name="$2"
            local api_url
            api_url=$(gh release view "v${PERSONAL_VERSION}" \
              --json assets \
              --jq ".assets[] | select(.name | endswith(\"${extension}\")) | .apiUrl" \
              | head -n 1)

            if [ -z "$api_url" ]; then
              echo "No ${extension} asset found for v${PERSONAL_VERSION}"
              exit 1
            fi

            local asset_id="${api_url##*/}"
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
              -f name="${target_name}"
          }

          rename_asset ".deb" "Rclone-UI-v${PERSONAL_VERSION%-personal}-linux-x64-personal.deb"
          rename_asset ".rpm" "Rclone-UI-v${PERSONAL_VERSION%-personal}-linux-x64-personal.rpm"

  release-windows:
    needs: release-linux
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Append personal version suffix
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PERSONAL="${VERSION}-personal"
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" src-tauri/tauri.conf.json
          sed -i "s/\"version\": \"${VERSION}\"/\"version\": \"${PERSONAL}\"/" package.json
          sed -i "s/^version = \"${VERSION}\"/version = \"${PERSONAL}\"/" src-tauri/Cargo.toml
          echo "PERSONAL_VERSION=${PERSONAL}" >> "$GITHUB_ENV"
          echo "Patched version: ${VERSION} -> ${PERSONAL}"

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: "--config '{\"bundle\":{\"createUpdaterArtifacts\":false}}'"

      - name: Rename Windows release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          api_url=$(gh release view "v${PERSONAL_VERSION}" \
            --json assets \
            --jq '.assets[] | select(.name | endswith(".exe")) | .apiUrl' \
            | head -n 1)

          if [ -z "$api_url" ]; then
            echo "No .exe asset found for v${PERSONAL_VERSION}"
            exit 1
          fi

          asset_id="${api_url##*/}"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
            -f name="Rclone-UI-v${PERSONAL_VERSION%-personal}-windows-x64-personal-setup.exe"
